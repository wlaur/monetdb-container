name: scan

on:
  schedule:
    - cron: "37 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  image:
    name: released-image
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Read image version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          source VERSION
          echo "value=${MONETDB_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Scan released image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/wlaur/monetdb-container:${{ steps.version.outputs.value }}
          format: table
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
