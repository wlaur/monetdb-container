name: scan

on:
  schedule:
    - cron: "37 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  image:
    name: released-image
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Read image version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          source VERSION
          echo "value=${MONETDB_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Pull released ARM64 image
        env:
          IMAGE_REF: ghcr.io/wlaur/monetdb-container:${{ steps.version.outputs.value }}
        shell: bash
        run: |
          set -euo pipefail
          docker pull --platform linux/arm64 "${IMAGE_REF}"
          platform="$(docker image inspect --format '{{.Os}}/{{.Architecture}}' "${IMAGE_REF}")"
          if [[ "${platform}" != "linux/arm64" ]]; then
            echo "Expected linux/arm64, got ${platform}" >&2
            exit 1
          fi

      - name: Scan released image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/wlaur/monetdb-container:${{ steps.version.outputs.value }}
          format: table
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
